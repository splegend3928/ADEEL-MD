<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="pinkWave" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="50%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#FF69B4"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="innerRect">
      <rect x="0" y="0" width="300" height="80" rx="30" />
    </clipPath>
    
    <filter id="pinkGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="300" height="80" fill="#000000" rx="30" stroke="url(#pinkWave)" stroke-width="4"/>

  <g clip-path="url(#innerRect)" opacity="0.6" filter="url(#pinkGlow)">
    <circle cx="40" cy="20" r="4" fill="url(#pinkWave)">
      <animate attributeName="cy" values="20;60;20" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cx" values="40;60;40" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="260" cy="60" r="5" fill="url(#pinkWave)">
      <animate attributeName="cy" values="60;20;60" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cx" values="260;240;260" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="15" r="2.5" fill="#ffffff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
      <animate attributeName="cy" values="15;65;15" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="80" cy="50" r="3.5" fill="url(#pinkWave)">
      <animate attributeName="cy" values="50;10;50" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="220" cy="30" r="3" fill="url(#pinkWave)">
      <animate attributeName="cy" values="30;70;30" dur="4.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="150" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="950" fill="url(#pinkWave)" style="letter-spacing: 2px;">
    ⭐ FORK
  </text>
</svg>
