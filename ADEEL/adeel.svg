<svg xmlns="http://www.w3.org/2000/svg" width="500" height="100" viewBox="0 0 500 100">
  <defs>
    <linearGradient id="goldWave" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="royalGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur" opacity="0.5"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="500" height="100" fill="#000000" rx="30" stroke="url(#goldWave)" stroke-width="4"/>
  
  <circle cx="80" cy="30" r="2" fill="#FFD700" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="150" cy="70" r="1.5" fill="#FFA500" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="250" cy="20" r="2.5" fill="#FFD700" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="350" cy="80" r="2" fill="#FFA500" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="420" cy="40" r="1.8" fill="#FFD700" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="450" cy="15" r="2" fill="#FFA500" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="50" cy="85" r="1.5" fill="#FFD700" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="300" cy="50" r="2" fill="#FFA500" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  
  <text x="250" y="60" text-anchor="middle" font-family="Arial" font-size="48" font-weight="900" fill="url(#goldWave)" filter="url(#royalGlow)">
    ADEEL-MD
  </text>
</svg>
